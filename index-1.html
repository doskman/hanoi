<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tower of Hanoi — BFS Solver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <p class="eyebrow">Breadth-First Search</p>
    <h1>Tower of Hanoi</h1>
    <p class="tagline">BFS-Powered Auto Solver</p>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">Mode</span>
      <span class="stat-value mode-val" id="mode-val">Manual</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-label">Moves</span>
      <span class="stat-value" id="moves-val">0</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-label">Optimal</span>
      <span class="stat-value accent" id="optimal-val">15</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-label">Disks</span>
      <span class="stat-value" id="disks-val">4</span>
    </div>
  </div>

  <!-- Banner -->
  <div id="banner"></div>

  <!-- BFS status -->
  <div id="bfs-status"></div>

  <!-- Game Area -->
  <div class="game-wrapper">
    <div class="game-area" id="game-area">
      <div class="base-bar"></div>
    </div>
  </div>

  <!-- Instruction -->
  <p id="instruction">Click a rod to pick up its top disk</p>

  <!-- Controls -->
  <div class="controls">
    <button id="auto-btn" class="btn-primary">⚡ Auto Solve (BFS)</button>
    <button id="undo-btn" disabled>↩ Undo</button>
    <button id="reset-btn">↺ Reset</button>
  </div>

  <!-- Speed control (visible during auto-solve) -->
  <div class="speed-control" id="speed-control">
    <span class="stat-label">Speed</span>
    <input type="range" id="speed-slider" min="100" max="1500" value="700" step="100" />
    <span id="speed-label">700ms</span>
  </div>

  <!-- Disk selector -->
  <div class="disk-selector">
    <span class="stat-label">Disks:</span>
    <button class="disk-btn" data-n="3">3</button>
    <button class="disk-btn active" data-n="4">4</button>
    <button class="disk-btn" data-n="5">5</button>
    <button class="disk-btn" data-n="6">6</button>
    <button class="disk-btn" data-n="7">7</button>
    <button class="disk-btn" data-n="8">8</button>
  </div>

  <!-- Move log -->
  <div class="move-log-wrapper">
    <p class="stat-label" style="margin-bottom:8px; letter-spacing:3px;">MOVE LOG</p>
    <div class="move-log" id="move-log">
      <p class="log-empty">No moves yet.</p>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
